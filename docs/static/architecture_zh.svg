<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="system-ui, -apple-system, 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <!-- Cloud Service -->
    <linearGradient id="cloud" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a6b8a"/><stop offset="100%" stop-color="#1e7a9e"/>
    </linearGradient>
    <!-- Brain -->
    <linearGradient id="brain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d6a4f"/><stop offset="100%" stop-color="#40916c"/>
    </linearGradient>
    <!-- AI Engine -->
    <linearGradient id="aiengine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b2d8b"/><stop offset="100%" stop-color="#9b5de5"/>
    </linearGradient>
    <!-- System Services -->
    <linearGradient id="svc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c47e0a"/><stop offset="100%" stop-color="#e6a817"/>
    </linearGradient>
    <!-- Desktop/Web -->
    <linearGradient id="desktop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e6091"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Edge -->
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/><stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <!-- HAL -->
    <linearGradient id="hal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a6741"/><stop offset="100%" stop-color="#6b8f5e"/>
    </linearGradient>
    <!-- Protocol -->
    <linearGradient id="proto" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5c4a3d"/><stop offset="100%" stop-color="#8b7355"/>
    </linearGradient>
    <!-- Skill Store -->
    <linearGradient id="store" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a4a6a"/><stop offset="100%" stop-color="#6b6b8e"/>
    </linearGradient>
    <!-- Hardware -->
    <linearGradient id="hw" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6a4a3d"/><stop offset="100%" stop-color="#a0715a"/>
    </linearGradient>
    <!-- Shadow -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="shadowSmall" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#484f58"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3fb950"/>
    </marker>
