  <text x="432" y="410" fill="#8b949e" font-size="9">C++17 · Chip-Level Acceleration</text>
  <text x="432" y="426" fill="#8b949e" font-size="9">Multi-Backend Dispatch:</text>
  <text x="432" y="442" fill="#58a6ff" font-size="9">NPU (TensorRT-LLM)</text>
  <text x="432" y="456" fill="#58a6ff" font-size="9">GPU (CUDA/vLLM)</text>
  <text x="432" y="470" fill="#58a6ff" font-size="9">CPU (llama.cpp/ONNX)</text>
  <text x="432" y="484" fill="#58a6ff" font-size="9">DSP · Cloud Fallback</text>

  <!-- QooSvc System Services -->
  <rect x="660" y="370" width="200" height="130" rx="6" fill="#0d1117" stroke="#e6a817" stroke-width="2"/>
  <rect x="660" y="370" width="200" height="24" rx="6" fill="url(#svc)"/>
  <text x="760" y="387" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">QooSvc System Services (services/)</text>

  <text x="672" y="410" fill="#8b949e" font-size="9">Voice Assistant · Spatial Understanding</text>
  <text x="672" y="426" fill="#8b949e" font-size="9">Navigation · Self-Diagnosis</text>
  <text x="672" y="442" fill="#8b949e" font-size="9">HMI Interaction · Charging Mgmt</text>
  <text x="672" y="458" fill="#8b949e" font-size="9">Multi-Robot Interconnection</text>
  <text x="672" y="474" fill="#8b949e" font-size="9">Video Processing · Person Detection</text>
  <text x="672" y="490" fill="#8b949e" font-size="9">Remote Access · OTA Update</text>

