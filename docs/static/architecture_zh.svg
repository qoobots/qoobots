  <text x="892" y="460" fill="#8b949e" font-size="9">Skill Download/Install · Sandbox Runtime</text>
  <text x="892" y="476" fill="#8b949e" font-size="9">Permission Mgmt · IPC</text>

  <!-- QooBody HAL -->
