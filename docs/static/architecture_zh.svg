  <text x="600" y="55" text-anchor="middle" fill="#8b949e" font-size="12">Full-Stack Open Source | Hardware + Software | Apache 2.0 | v1.0.0-alpha</text>

  <!-- ===== Layer 1: Cloud Service Layer (Y=70) ===== -->
  <rect x="30" y="70" width="1140" height="120" rx="8" fill="#0d1117" stroke="#1a6b8a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="50" y="92" fill="#1e7a9e" font-size="13" font-weight="bold">☁️ Cloud Service Layer — qoobot-service (Java Spring Boot Microservices)</text>

  <!-- Cloud Submodules -->
  <rect x="50" y="102" width="155" height="36" rx="4" fill="url(#cloud)" filter="url(#shadowSmall)"/>
  <text x="127" y="125" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">qooauth Auth Service</text>

  <rect x="220" y="102" width="155" height="36" rx="4" fill="url(#cloud)" filter="url(#shadowSmall)"/>
  <text x="297" y="125" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">qoocloud Cloud Platform</text>

  <rect x="390" y="102" width="155" height="36" rx="4" fill="url(#cloud)" filter="url(#shadowSmall)"/>
  <text x="467" y="125" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">qoostore Skill Store</text>

  <rect x="560" y="102" width="155" height="36" rx="4" fill="url(#cloud)" filter="url(#shadowSmall)"/>
  <text x="637" y="125" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">qoochain Supply Chain</text>

  <rect x="730" y="102" width="155" height="36" rx="4" fill="url(#cloud)" filter="url(#shadowSmall)"/>
  <text x="807" y="125" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">qoogear Gear Certification</text>

  <rect x="900" y="102" width="155" height="36" rx="4" fill="url(#cloud)" filter="url(#shadowSmall)"/>
  <text x="977" y="125" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">qoocommunity Community</text>

  <!-- Cloud Sub-Functions -->
  <text x="55" y="158" fill="#8b949e" font-size="9">OAuth2.0 · API Key</text>
  <text x="55" y="170" fill="#8b949e" font-size="9">Device Trust · Security Audit</text>
  <text x="225" y="158" fill="#8b949e" font-size="9">Remote Inference · Digital Twin</text>
  <text x="225" y="170" fill="#8b949e" font-size="9">OTA · Multi-Robot Orchestration</text>
  <text x="395" y="158" fill="#8b949e" font-size="9">Skill Publishing · CDN Distribution</text>
  <text x="395" y="170" fill="#8b949e" font-size="9">Order Payment · Review Analysis</text>
  <text x="565" y="158" fill="#8b949e" font-size="9">Manufacturing · BOM Management</text>
  <text x="565" y="170" fill="#8b949e" font-size="9">Factory Calibration · Quality Inspection</text>
  <text x="735" y="158" fill="#8b949e" font-size="9">MFQ Certification Process</text>
  <text x="735" y="170" fill="#8b949e" font-size="9">Lab Management</text>
  <text x="905" y="158" fill="#8b949e" font-size="9">Forum · Content Management</text>
  <text x="905" y="170" fill="#8b949e" font-size="9">Governance · Events</text>

  <!-- Layer 1 → Layer 2 -->
  <line x1="600" y1="190" x2="600" y2="210" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ===== Layer 2: User Access Layer (Y=210) ===== -->
  <rect x="30" y="210" width="1140" height="100" rx="8" fill="#0d1117" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="50" y="232" fill="#58a6ff" font-size="13" font-weight="bold">💻 User Access Layer — Desktop / Web / Mobile</text>

  <!-- qoobot-desktop -->
  <rect x="50" y="245" width="280" height="50" rx="4" fill="url(#desktop)" filter="url(#shadowSmall)"/>
  <text x="190" y="264" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">qoobot-desktop Desktop App</text>
  <text x="190" y="282" text-anchor="middle" fill="#c9d1d9" font-size="9">qoodev CLI (19 sub-modules) · qooremote (PySide6)</text>

  <!-- qoobot-web -->
  <rect x="350" y="245" width="460" height="50" rx="4" fill="url(#desktop)" filter="url(#shadowSmall)"/>
  <text x="580" y="264" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">qoobot-web Web Application</text>
  <text x="580" y="282" text-anchor="middle" fill="#c9d1d9" font-size="9">portal · admin (Vue3) · community · brain-viz (Next.js) · gear · remote · dev-dashboard</text>

  <!-- qoobot-mobile -->
  <rect x="830" y="245" width="200" height="50" rx="4" fill="url(#desktop)" opacity="0.5" filter="url(#shadowSmall)"/>
  <text x="930" y="264" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">qoobot-mobile</text>
  <text x="930" y="282" text-anchor="middle" fill="#c9d1d9" font-size="9">Android / iOS (Planned)</text>

  <!-- Layer 2 → Layer 3 -->
  <line x1="600" y1="310" x2="600" y2="335" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrowGray)"/>

