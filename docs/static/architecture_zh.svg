  <text x="307" y="564" text-anchor="middle" fill="#6b8f5e" font-size="10">sensor Sensor Interface</text>
  <rect x="395" y="546" width="155" height="28" rx="3" fill="#2d3a2d"/>
  <text x="472" y="564" text-anchor="middle" fill="#6b8f5e" font-size="10">actuator Actuator Driver</text>
  <rect x="560" y="546" width="155" height="28" rx="3" fill="#2d3a2d"/>
  <text x="637" y="564" text-anchor="middle" fill="#6b8f5e" font-size="10">power Power Management</text>
  <rect x="725" y="546" width="155" height="28" rx="3" fill="#2d3a2d"/>
  <text x="802" y="564" text-anchor="middle" fill="#6b8f5e" font-size="10">safety_hw Safety HW</text>
  <rect x="890" y="546" width="155" height="28" rx="3" fill="#2d3a2d"/>
  <text x="967" y="564" text-anchor="middle" fill="#6b8f5e" font-size="10">comm Communication Bus</text>

  <!-- Layer 3 -> Layer 4 -->
  <line x1="600" y1="645" x2="600" y2="670" stroke="#484f58" stroke-width="1.5" marker-end="url(#arrowGray)"/>

