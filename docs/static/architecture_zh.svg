  <text x="125" y="438" fill="#8b949e" font-size="9">Python Client Library · gRPC · WebSocket</text>
  <text x="62" y="452" fill="#58a6ff" font-size="9">brain_sim</text>
  <text x="125" y="452" fill="#8b949e" font-size="9">MuJoCo · Isaac Sim · Gazebo Simulation Bridge</text>
  <text x="62" y="466" fill="#58a6ff" font-size="9">brain_proto</text>
  <text x="125" y="466" fill="#8b949e" font-size="9">13 .proto Protocols (Perception/Cognition/Decision/Control)</text>
  <text x="62" y="480" fill="#58a6ff" font-size="9">brain_models</text>
  <text x="125" y="480" fill="#8b949e" font-size="9">Qwen2.5-7B · YOLOv11 · SAM2 · Whisper V3</text>

  <!-- QooCore AI Engine -->
  <rect x="420" y="370" width="220" height="130" rx="6" fill="#0d1117" stroke="#9b5de5" stroke-width="2"/>
  <rect x="420" y="370" width="220" height="24" rx="6" fill="url(#aiengine)"/>
