  <text x="50" y="790" fill="#d2a679" font-size="12" font-weight="bold">🔌 qoobot-proto Cross-Platform Protocol Hub — gRPC / Protobuf Unified Communication Spec</text>
  <text x="50" y="810" fill="#8b949e" font-size="10">8 Protocol Domains: auth · brain · cloud · device · gear · remote · services · store  |  Proto files distributed across modules (brain 13 · services 6 · auth 4 · gear 3 · store 4)</text>

  <!-- ===== Inter-Layer Communication ===== -->
  <!-- Cloud <-> Robot OS -->
  <path d="M160,190 L160,335" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowBlue)" opacity="0.4"/>
